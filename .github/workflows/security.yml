# ──────────────────────────────────────────────────────────────────────────────
# Security Audit — Grupo 7 Reportería, Batch y Streaming
#
# Ejecuta análisis estático de seguridad con Facebook Pysa (taint analysis)
# y publica los resultados en la pestaña "Security > Code scanning" del repo.
#
# Se activa en:
#   - Push y PR contra main/develop
#   - Cada lunes a las 08:00 (UTC-3 Santiago) — schedule semanal proactivo
#
# Permisos requeridos en el repo:
#   Settings → Code security → Code scanning → habilitado
# ──────────────────────────────────────────────────────────────────────────────

name: Security Audit (Pysa)

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - "docs/**"
      - "*.md"
  schedule:
    # Lunes 08:00 UTC (05:00 Santiago / 11:00 Santiago en horario de invierno)
    - cron: "0 11 * * 1"
  workflow_dispatch: # permite ejecución manual desde la UI de GitHub

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pysa:
    name: Pysa — Taint Analysis
    runs-on: ubuntu-latest

    permissions:
      # Requerido para subir resultados SARIF a GitHub Code Scanning
      security-events: write
      # Requerido para leer el código del repo en PRs de forks
      actions: read
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v7

      - name: Ejecutar análisis Pysa
        # facebook/pysa-action instala Pyre + Pysa, ejecuta el análisis
        # y emite un archivo sarif.json con los hallazgos.
        uses: facebook/pysa-action@v0.0.1
        with:
          repo-directory: "./app"
          requirements-path: "requirements.txt"

      - name: Subir resultados SARIF a GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        # Se ejecuta siempre para que los hallazgos queden registrados
        # incluso si el step anterior encontró problemas.
        if: always()
        with:
          sarif_file: sarif.json
          category: pysa

      - name: Subir SARIF como artefacto (respaldo)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pysa-sarif-${{ github.run_id }}
          path: sarif.json
          retention-days: 30
